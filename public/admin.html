<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Big Five Personality Test</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Admin Panel</h1>
    <p>Total Participants: <span id="total-participants">0</span></p>
    
    <h2>Average Personality Traits</h2>
    <canvas id="averageChart" width="400" height="200"></canvas>
    
    <h2>Sex Distribution</h2>
    <canvas id="sexChart" width="200" height="200"></canvas>
    
    <h2>All Results</h2>
    <table id="results-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Sex</th>
                <th>Extraversion (%)</th>
                <th>Agreeableness (%)</th>
                <th>Conscientiousness (%)</th>
                <th>Neuroticism (%)</th>
                <th>Openness (%)</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    
    <script src="admin.js"></script>
</body>
</html>
